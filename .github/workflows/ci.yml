name: Backend CI

"on":
  pull_request:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Laravel Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: voteclair_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d voteclair_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: api

    env:
      APP_ENV: testing
      APP_DEBUG: true
      APP_URL: http://127.0.0.1
      API_VERSION: ci
      LOG_CHANNEL: stderr
      LOG_STACK: stderr
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: voteclair_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_CLIENT: phpredis
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none
          extensions: mbstring, pdo_pgsql, redis, bcmath, intl, zip
          cache: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
          php artisan optimize:clear

      - name: Run tests
        env:
          BROADCAST_CONNECTION: null
          CACHE_STORE: array
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
          DB_URL: ''
          MAIL_MAILER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php artisan test

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Run Larastan
        env:
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Build production Docker image
        working-directory: .
        run: docker build -f infra/docker/prod/Dockerfile -t voteclair-production-ci .
