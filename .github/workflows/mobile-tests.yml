name: Mobile Tests

"on":
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-tests.yml'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
